name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag
        default: beta
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Resolve release metadata
        id: release
        env:
          REQUESTED_NPM_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
            [[ "$version" == *-* ]] && npm_tag="beta" || npm_tag="latest"
          else
            npm_tag="${REQUESTED_NPM_TAG:-beta}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "npm-tag=$npm_tag" >> "$GITHUB_OUTPUT"
      - name: Publish package
        env:
          NPM_TAG: ${{ steps.release.outputs.npm-tag }}
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "skip existing $name@$version"
          else
            npm publish --provenance --access public --tag "$NPM_TAG"
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists"
            exit 0
          fi

          args=("$TAG" --title "ElfUI Router $VERSION" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
